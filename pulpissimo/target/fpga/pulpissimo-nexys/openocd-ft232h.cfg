# OpenOCD config para Nexys A7-100T con FT232H externo (CJMCU, 0x0403:0x6014)
# PMOD JA: AD0=TCK(G17), AD1=TDI(D18), AD2=TDO(E18), AD3=TMS(C17)

interface ftdi
ftdi_vid_pid 0x0403 0x6014
ftdi_layout_init 0x0008 0x000b

reset_config none

adapter_khz 1000

set _CHIPNAME riscv

jtag newtap $_CHIPNAME unknown0 -irlen 5 -expected-id 0x5fffedb3
jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x50001db3

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME riscv -chain-position $_TARGETNAME -coreid 0x3e0

# Expose the custom instruction-category CSR block to GDB.
# 0xBC0..0xBCB = 3008..3019
$_TARGETNAME riscv expose_csrs 3008-3019

gdb_report_data_abort enable
gdb_report_register_access_error enable

riscv set_reset_timeout_sec 120
riscv set_command_timeout_sec 120

riscv set_prefer_sba on

scan_chain

init
halt
echo "Ready for Remote Connections"
